<!DOCTYPE html>
<html lang="ko">
<head>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MooM Partner Application</title>
    
    <meta property="og:title" content="MooM 인플루언서 커뮤니티 가입">
    <meta property="og:description" content="데이터 기반 프리미엄 인플루언서 매칭 플랫폼">
    <meta property="og:image" content="https://github.com/moom-bin/moom/blob/main/moom_logo.png?raw=true">
    <meta property="og:url" content="https://moom-bin.github.io/moom/">
    <meta property="og:type" content="website">


    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        /* [수정] 배경: 단순 검정 -> 깊이감 있는 그라데이션 */
        body { 
            background: radial-gradient(circle at top, #1a1a1a 0%, #000000 100%); 
            color:#fff; font-family:'Pretendard', sans-serif; text-align:center; padding:40px 20px; margin:0; line-height:1.6; 
            min-height: 100vh;
        }

        /* [수정] 박스: 유리 질감(Glassmorphism) 및 네온 라인 강화 */
        .form-box { 
            background: rgba(25, 25, 25, 0.8); 
            backdrop-filter: blur(10px);
            padding:30px 20px; border-radius:24px; 
            border:1px solid rgba(204, 255, 0, 0.3); 
            max-width:450px; margin:auto; 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 15px rgba(204, 255, 0, 0.05); 
            text-align:left; 
        }

        h1 { color:#CCFF00; font-size:28px; margin-bottom:10px; text-align:center; letter-spacing:-1px; text-shadow: 0 0 10px rgba(204, 255, 0, 0.3); }
        p.sub { color:#888; font-size:14px; margin-bottom:30px; text-align:center; }
        
        label { display:block; font-size:13px; color:#CCFF00; font-weight:700; margin-top:20px; margin-bottom:8px; }

        /* [수정] 입력창: 더 어둡게 처리하여 대비 극대화 */
        input, select, textarea { 
            width:100%; padding:14px; box-sizing:border-box; border-radius:12px; 
            border:1px solid #333; 
            background:#0a0a0a; color:#fff; font-size:15px; transition:0.2s;
        }
        input:focus, select:focus { border-color:#CCFF00; outline:none; background:#111; box-shadow: 0 0 8px rgba(204, 255, 0, 0.2); }
        
        .channel-group { display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:5px; }
        .checkbox-group { display:flex; flex-wrap:wrap; gap:10px; margin-top:10px; }
        
        input[type="checkbox"] { display:none; }
        .check-label { display:inline-block; padding:8px 18px; border-radius:30px; border:1px solid #333; font-size:13px; cursor:pointer; background:#111; color:#888; transition:0.2s; }
        input[type="checkbox"]:checked + .check-label { color:#000; background:#CCFF00; border-color:#CCFF00; font-weight:bold; }

        .agree-box { margin-top:30px; padding:15px; background:rgba(255,255,255,0.03); border-radius:12px; font-size:12px; color:#777; border:1px solid #222; }

        /* [수정] 버튼: 입체감 있는 그라데이션 및 네온 효과 */
        .btn-submit { 
            width:100%; padding:20px; 
            background: linear-gradient(135deg, #CCFF00 0%, #99CC00 100%); 
            color:#000; font-weight:900; border:none; border-radius:15px; cursor:pointer; 
            margin-top:30px; font-size:18px; 
            box-shadow: 0 10px 25px rgba(204, 255, 0, 0.25); 
            transition: 0.3s;
        }
        .btn-submit:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(204, 255, 0, 0.4); }
        .btn-submit:disabled { background:#333; color:#555; cursor:not-allowed; box-shadow:none; opacity: 0.6; }
    </style>
</head>
<body>

    <h1>MooM Partner</h1>
    <p class="sub">데이터 기반 프리미엄 파트너십 입점 신청</p>

    <div class="form-box">
        <label>실명 (정산 및 본인 확인용)</label>
        <input type="text" id="name" placeholder="성함을 입력하세요" required>

        <label>주력 채널 정보 (해당되는 곳만 입력)</label>
        <div class="channel-group">
            <input type="text" id="insta_id" placeholder="인스타 ID (@제외)">
            <input type="number" id="insta_fol" placeholder="인스타 팔로워(수)">
        </div>
        <div class="channel-group">
            <input type="text" id="tiktok_id" placeholder="틱톡 ID/링크">
            <input type="number" id="tiktok_fol" placeholder="틱톡 팔로워(수)">
        </div>
        <div class="channel-group">
            <input type="text" id="youtube_id" placeholder="유튜브 채널명">
            <input type="number" id="youtube_fol" placeholder="구독자(수)">
        </div>

        <label>주 활동 지역</label>
        <select id="region">
            <option value="">지역 선택</option>
            <option value="서울">서울</option>
            <option value="경기/인천">경기/인천</option>
            <option value="부산/경상">부산/경상</option>
            <option value="대구/경북">대구/경북</option>
            <option value="광주/전라">광주/전라</option>
            <option value="대전/충청">대전/충청</option>
            <option value="강원/제주">강원/제주</option>
        </select>

        <label>관심 카테고리 (중복 가능)</label>
        <div class="checkbox-group">
            <input type="checkbox" id="cat1" name="category" value="뷰티"><label for="cat1" class="check-label">뷰티</label>
            <input type="checkbox" id="cat2" name="category" value="패션"><label for="cat2" class="check-label">패션</label>
            <input type="checkbox" id="cat3" name="category" value="라이프스타일"><label for="cat3" class="check-label">라이프스타일</label>
            <input type="checkbox" id="cat4" name="category" value="맛집/카페"><label for="cat4" class="check-label">맛집/카페</label>
            <input type="checkbox" id="cat5" name="category" value="육아"><label for="cat5" class="check-label">육아</label>
        </div>

        <div class="agree-box">
            [활동 규정 및 개인정보 동의]<br>
            - 허위 데이터 제출 시 파트너 자격이 박탈됩니다.<br>
            - 광고주와의 직거래는 엄격히 금지됩니다.<br>
            - 수집된 정보는 협찬 매칭 용도로만 활용됩니다.
        </div>
        <div style="margin-top:15px; text-align:center;">
            <input type="checkbox" id="agree" style="display:inline-block; width:auto; margin-right:8px;">
            <label for="agree" style="display:inline-block; color:#fff; font-size:13px;">위 내용을 확인했으며 동의합니다.</label>
        </div>

        <button class="btn-submit" id="submitBtn" onclick="submitForm()" disabled>MooM 파트너 신청하기</button>
    </div>

    <script>
        // 동의 체크박스 상태에 따라 버튼 활성화
        document.getElementById('agree').addEventListener('change', function(e) {
            document.getElementById('submitBtn').disabled = !e.target.checked;
        });

        function submitForm() {
            const categories = Array.from(document.querySelectorAll('input[name="category"]:checked')).map(cb => cb.value);
            
            const data = {
                name: document.getElementById('name').value,
                insta_id: document.getElementById('insta_id').value,
                insta_fol: document.getElementById('insta_fol').value,
                tiktok_id: document.getElementById('tiktok_id').value,
                tiktok_fol: document.getElementById('tiktok_fol').value,
                youtube_id: document.getElementById('youtube_id').value,
                youtube_fol: document.getElementById('youtube_fol').value,
                region: document.getElementById('region').value,
                category: categories.join(', ')
            };

            if(!data.name) { alert("성함을 입력해주세요."); return; }
            
            document.getElementById('submitBtn').innerText = "처리 중...";
            document.getElementById('submitBtn').disabled = true;

            fetch('https://script.google.com/macros/s/AKfycby56JgtyEMemRVzC8QfE2iqu3cWx8YRXzTCLEynYinN95RSejd1dhNpXOdClQTG8KX0/exec', {
                method: 'POST',
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(res => {
                sessionStorage.setItem('moom_partner_code', res.id);
                location.href = 'complete.html';
            })
            .catch(err => {
                alert("오류가 발생했습니다. 다시 시도해주세요.");
                document.getElementById('submitBtn').innerText = "신청하기";
                document.getElementById('submitBtn').disabled = false;
            });
        }
    </script>
</body>
</html>
